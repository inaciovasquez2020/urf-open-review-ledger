name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean toolchain and lake
        uses: leanprover/lean-action@v1
        with:
          cache: true

      - name: Build
        run: lake build
