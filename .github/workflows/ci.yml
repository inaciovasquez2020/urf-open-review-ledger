name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          cache: false
          use-mathlib-cache: false

      - run: lake update
      - run: lake build
     
 - name: Invariant file binding
        run: |
          while read -r file; do
            test -f "$file"
          done < .ci/required_files.txt
