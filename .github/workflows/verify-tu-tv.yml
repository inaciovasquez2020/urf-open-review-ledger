name: verify-tu-tv

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          lake_package_dir: .
          build: false

      - name: Lake update
        run: lake update

      - name: Get mathlib cache
        run: lake exe cache get

      - name: Lean build
        run: lake build

      - name: Python compile check
        run: |
          python3 -m py_compile tools/tu/tu_seymour_verify.py
          python3 -m py_compile tools/tv_cert/generate_tv_finite_cert.py
          python3 -m py_compile tools/tv_cert/verify_tv_finite_cert.py

      - name: TU smoke test
        run: |
          python3 tools/tu/tu_seymour_verify.py tools/tu/testdata/network_minimal_CERT.json

      - name: TV finite certificate test
        run: |
          python3 tools/tv_cert/generate_tv_finite_cert.py 8 /tmp/tv_finite_n8_CERT.json
          python3 tools/tv_cert/verify_tv_finite_cert.py /tmp/tv_finite_n8_CERT.json

      - name: TV step certificate test
        run: |
          python3 tools/tv_step_cert/generate_tv_step_cert.py 10 /tmp/tv_step_n10_CERT.json
          python3 tools/tv_step_cert/verify_tv_step_cert.py /tmp/tv_step_n10_CERT.json

      - name: Mathlib lemma index script
        run: |
          tools/mathlib_index/index_signedmeasure_tv.sh
          test -s docs/mathlib/SIGNEDMEASURE_TV_LEMMAS.txt
