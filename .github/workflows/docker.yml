name: Docker (deterministic)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "core-green-*"
      - "repo-hygiene-*"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build image (no push)
        run: |
          docker build \
            --pull \
            --no-cache \
            --build-arg VCS_REF=${{ steps.meta.outputs.sha }} \
            --build-arg BUILD_DATE=${{ steps.meta.outputs.date }} \
            -t urf-core:${{ steps.meta.outputs.sha }} .

      - name: Emit image digest
        run: |
          docker images --digests | sed -n '1,5p'
