name: Docker (deterministic)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (no push)
        run: |
          docker build --pull --no-cache -t urf-core:${GITHUB_SHA} .
          docker images --digests | sed -n '1,10p'
