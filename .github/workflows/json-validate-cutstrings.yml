name: json-validate-cutstrings

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install jsonschema

      - run: |
          python - <<'PY'
          import json, jsonschema
          schema = json.load(open("admissible/schema/cutstrings.transcript.schema.json"))
          example = json.load(open("admissible/schema/examples/cutstrings.transcript.example.json"))
          jsonschema.validate(example, schema)
          print("CutStrings transcript OK")
          PY

