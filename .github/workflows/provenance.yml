name: Provenance (SLSA) — attest release artifacts

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure merkle root exists (tracked build)
        run: |
          chmod +x scripts/build-merkle.sh || true
          ./scripts/build-merkle.sh

      - name: Attest build provenance (key artifacts)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            transparency/merkle.root
            transparency/files.sha256
            sigstore/image.digest
            sigstore/cosign.bundle.json
