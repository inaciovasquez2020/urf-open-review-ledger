name: no-benchmarks-validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install jsonschema

      - run: |
          python - <<'PY'
          import json, glob
          import jsonschema

          schema = json.load(open("admissible/schema/no_benchmark.schema.json"))
          files = sorted(glob.glob("admissible/no_benchmarks/*.json"))
          assert files, "no NO benchmark json files found"

          for f in files:
            obj = json.load(open(f))
            jsonschema.validate(obj, schema)
            print("OK", f)

          print("All NO benchmarks validated.")
          PY
