name: Meta DAG

on:
  push:
  pull_request:

jobs:
  compile-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: python -m pip install -r tools/requirements.txt

      - name: Compile DAG
        run: ./tools/compile_dag.py

      - name: Ensure DAG is committed (no diff)
        run: ./tools/check_dag_clean.sh

      - name: Verify DAG
        run: ./tools/verify_dag.py

      - name: Verify MANIFEST.sha256
        run: ./tools/verify_manifest.py
