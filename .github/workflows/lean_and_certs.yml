name: lean_and_certs

on:
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
  push:
  pull_request:
  workflow_dispatch:

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  build:
    runs-on: ubuntu-latest
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**

    steps:
      - uses: actions/checkout@v4

      - name: Install elan + Lean + lake (manual, no lean-action)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          source $HOME/.elan/env
          lean --version
          lake --version

      - name: Lake update
        run: |
          source $HOME/.elan/env
          lake update

      - name: Build
        run: |
          source $HOME/.elan/env
          lake build
