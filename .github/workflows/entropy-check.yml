name: entropy-check

on:
  push:
  pull_request:

jobs:
  entropy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python - <<'PY'
          import json
          from admissible.verifiers.entropy_check import verify_trace

          ex = json.load(open("admissible/schema/examples/cutstrings.transcript.example.json"))
          ok, bad = verify_trace(ex["trace"], ex["alphabet_size"])
          assert ok, f"Entropy violation at step {bad}"
          print("entropy ΔH check OK")
          PY

