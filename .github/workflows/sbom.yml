name: SBOM (SPDX + CycloneDX) + cosign sign

on:
  push:
    tags:
      - 'v*'
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  sbom:
    runs-on:
  push:
    tags:
      - 'v*'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOMs
        run: |
          mkdir -p sbom
          syft dir:. -o spdx-json=sbom/sbom.spdx.json
          syft dir:. -o cyclonedx-json=sbom/sbom.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign SBOM files (blob, keyless) + bundle
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign-blob --yes --bundle sbom/sbom.spdx.bundle.json sbom/sbom.spdx.json
          cosign sign-blob --yes --bundle sbom/sbom.cdx.bundle.json sbom/sbom.cdx.json

      - name: Attest provenance for SBOMs
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            sbom/sbom.spdx.json
            sbom/sbom.cdx.json
            sbom/sbom.spdx.bundle.json
            sbom/sbom.cdx.bundle.json

      - name: Commit SBOMs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sbom
          git commit -m "sbom: add signed SBOMs for ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main
