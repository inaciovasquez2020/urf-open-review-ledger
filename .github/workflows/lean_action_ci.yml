name: Lean CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lean + Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          lake-cache: true

      - name: Build
        run: lake build

