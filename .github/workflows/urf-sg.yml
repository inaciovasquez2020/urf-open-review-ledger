name: URF-SG Verification

on:
  push:
  pull_request:

jobs:
  verify-urf-sg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install numpy jsonschema
      - name: Run URF-SG verifier
        run: |
          cd standards/URF-SG
          python verify.py examples/URF-SG-BASE-2.json

