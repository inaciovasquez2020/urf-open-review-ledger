name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean toolchain (elan)
        uses: leanprover/lean-action@v1

      - name: Lake update (deps)
        run: lake update

      - name: Lake build
        run: lake build

      # HARD PURGE build artifacts (role=core cannot contain .lake)
      - name: Purge lake artifacts
        run: |
          rm -rf .lake || true
          find . -name ".lake" -type d -prune -exec rm -rf {} +

      - name: Rolecheck core
        run: python3 tools/rolecheck/rolecheck.py core
