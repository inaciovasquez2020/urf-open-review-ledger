name: Lean

on:
  push:
  pull_request:

jobs:
  lean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          source "$HOME/.elan/env"
          lean --version
