name: Lean Action CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean
        uses: leanprover/lean-action@v1
        with:
          use-lake: true

      - name: Generate Lake manifest
        run: lake update

      - name: Build
        run: lake build
