name: Lean CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preinstall Elan + Lean toolchain (retry)
        run: |
          set -eux
          curl -L --retry 10 --retry-delay 15 https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          source "$HOME/.profile" || true
          elan toolchain install leanprover/lean4:v4.27.0
          elan default leanprover/lean4:v4.27.0
          lean --version

      - uses: leanprover/lean-action@v1
        with:
          auto-config: true
          use-github-cache: true

      - name: Build
        run: lake build
