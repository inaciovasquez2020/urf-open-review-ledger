name: Lean build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
      - uses: leanprover-community/setup-lean@v1
      - name: Cache Lake
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Lake update
        run: lake update

      - name: Build
        run: lake build
