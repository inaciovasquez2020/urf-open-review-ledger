name: pdf-verify

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]
 (ci: fix pdf-verify workflow YAML structure)

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX (manual verification only)
      - name: Install TeX
 (ci: fix pdf-verify workflow YAML structure)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-science \
            texlive-pictures \
            latexmk

      - name: Sanity checks (manual)
      - name: Sanity checks
 (ci: fix pdf-verify workflow YAML structure)
        run: |
          set -euo pipefail
          test -f README.md
          test -f STATUS.md
          test -f FREEZE.md
          test -f trw-erb-sigc.tex
          test -f CITATION.cff
          echo "PDF verify sanity (manual) passed"
          echo "Sanity checks passed"
 (ci: fix pdf-verify workflow YAML structure)

