name: Lean Attest

on:
  workflow_dispatch:
  push:
    tags: ["v*","core-green-*","repo-hygiene-*"]

permissions:
  contents: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: leanprover/lean-action@v1

      - name: lake update + build
        run: |
          lake update
          lake build

      - name: emit lean attestation
        run: |
          ./scripts/lean-attest.sh

      - name: commit attestation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean-attest || true
          git diff --cached --quiet && exit 0
          git commit -m "ci: lean attestation for ${GITHUB_REF_NAME:-manual}"
          git push origin HEAD:main
