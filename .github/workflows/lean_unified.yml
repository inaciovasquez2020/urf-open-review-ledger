name: lean_unified

on:
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
  push:
  pull_request:
  workflow_dispatch:

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  build:
    runs-on: ubuntu-latest
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
    steps:
      - uses: actions/checkout@v4
      - run: bash tools/ci/install_lean.sh
      - run: bash tools/ci/capture_env.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ci-env
          path: ci-artifacts/
      - run: source "$HOME/.elan/env" && lake update
      - run: source "$HOME/.elan/env" && lake build
