name: lean_unified

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: bash tools/ci/install_lean.sh
      - run: bash tools/ci/assert_path.sh
      - run: bash tools/ci/verify_toolchain.sh
      - run: bash tools/ci/assert_lake.sh

      - run: lake update
      - run: lake build
