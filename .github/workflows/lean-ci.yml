name: Lean CI

on:
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
  push:
  pull_request:
  workflow_dispatch:

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  build:
    runs-on: ubuntu-latest
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean toolchain (retry hardened)
        run: |
          set -e
          for i in 1 2 3 4 5; do
            curl -L https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y && break
            echo "Retry elan install $i"
            sleep 15
          done
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          source "$HOME/.elan/env"

      - name: Pin Lean toolchain
        run: |
          elan toolchain install leanprover/lean4:v4.27.0
          elan default leanprover/lean4:v4.27.0

      - name: Show Lean version
        run: lean --version

      - name: Lake update
        run: lake update

      - name: Try mathlib cache (non-fatal)
        run: lake exe cache get || true

      - name: Build
        run: lake build
