name: lean_container

on:
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  if: |n      exists('lean-toolchain') ||n      exists('proofs') ||n      exists('certs') ||n      exists('artifacts')
  build:
    runs-on: ubuntu-latest
  push:n    paths-ignore:n      - zloop/**n  pull_request:n    paths-ignore:n      - zloop/**
    steps:
      - uses: actions/checkout@v4
      - name: Build CI image
        run: |
          docker build -f Dockerfile.ci -t urf-ci:local .
          docker image inspect urf-ci:local --format='{{.Id}}' | tee ci-image.id
      - name: Run build in container
        run: |
          docker run --rm -v "$PWD:/work" -w /work urf-ci:local bash -lc "lake update && lake build"
      - uses: actions/upload-artifact@v4
        with:
          name: ci-image-id
          path: ci-image.id
