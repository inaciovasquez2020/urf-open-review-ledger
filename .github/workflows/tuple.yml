name: Tuple (CI binding)

on:
  push:
    tags:
      - 'v*'
  push:
    tags:
      - "v*"
      - "core-green-*"
      - "repo-hygiene-*"

permissions:
  contents: write

jobs:
  tuple:
    runs-on:
  push:
    tags:
      - 'v*'
    steps:
      - uses: actions/checkout@v4
      with:n        fetch-depth: 0
        with:
          fetch-depth: 0

      - name: Make attestation + merkle + tuple
        run: |
          tag="${GITHUB_REF_NAME}"
          ./scripts/lean-attest.sh
          ./scripts/build-merkle.sh
          ./tuple/MAKE_TUPLE.sh "$tag" || true
          file="tuple/TUPLE_${tag}.txt"
          if [ -f "$file" ]; then
            url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            perl -pi -e "s|^ci_run_url:.*$|ci_run_url: $url|g" "$file"
          fi

      - name: Commit back to main (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean-attest transparency tuple || true
          git diff --cached --quiet && exit 0
          git commit -m "ci: bind attest+merkle+tuple (${GITHUB_REF_NAME}) run ${GITHUB_RUN_ID}"
          git push origin HEAD:main
