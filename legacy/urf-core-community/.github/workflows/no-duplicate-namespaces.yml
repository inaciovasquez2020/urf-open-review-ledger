name: No Duplicate Namespace Check
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean toolchain (elan + lake)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          source $HOME/.elan/env
          lean --version
          lake --version

      - name: Cache elan + lake
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/lean
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain') }}

      - name: Detect duplicate namespaces (same file only)
        run: |
          dup=$(grep -R '^[[:space:]]*namespace[[:space:]]\+' -n lean 2>/dev/null \
            | awk -F: '{print $1 ":" $3}' \
            | sort | uniq -c | awk '$1>1 {print $2}')
          if [ -n "$dup" ]; then
            echo "Duplicate namespaces found within same file:"
            echo "$dup"
            exit 1
          fi

      - name: Lake update
        run: |
          source $HOME/.elan/env
          lake update

      - name: Build
        run: |
          source $HOME/.elan/env
          lake build
